name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------
      # ZAP実行（JSON出力）
      # -----------------------
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/app/"
          fail_action: false
          report_format: json
          report_file: zap.json

      # -----------------------
      # ZAP JSON解析
      # -----------------------
      - name: Parse ZAP results
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          if [ ! -f zap.json ]; then
            echo "zap.json not found"
            exit 1
          fi

          HIGH=$(jq '[.site[].alerts[] | select(.riskcode=="3")] | length' zap.json)
          MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode=="2")] | length' zap.json)
          LOW=$(jq '[.site[].alerts[] | select(.riskcode=="1")] | length' zap.json)

          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV

      # -----------------------
      # timestamp固定
      # -----------------------
      - name: Set timestamp
        run: |
          DATE=$(date -u +%F-%H%M%S)
          echo "DATE=$DATE" >> $GITHUB_ENV

      # -----------------------
      # status.json（履歴付き）
      # -----------------------
      - name: Update status.json
        run: |
          mkdir -p docs/data
          FILE=docs/data/status.json

          if [ -f "$FILE" ]; then
            HISTORY=$(jq '.history // []' $FILE)
          else
            HISTORY="[]"
          fi

          UPDATED=$(echo $HISTORY | jq --arg d "$DATE" '[.[]] + [$d] | .[0:10]')

          echo "{
            \"last_scan\": \"$(date -u +%F %T)\",
            \"latest\": \"$DATE\",
            \"high\": $HIGH,
            \"medium\": $MEDIUM,
            \"low\": $LOW,
            \"history\": $UPDATED
          }" > $FILE

      # -----------------------
      # レポート保存
      # -----------------------
      - name: Save report history
        run: |
          mkdir -p docs/zap-report/$DATE

          if [ -f zap.json ]; then
            cp zap.json docs/zap-report/$DATE/
          fi

      # -----------------------
      # latestリンク
      # -----------------------
      - name: Create latest link
        run: |
          ln -sfn $DATE docs/zap-report/latest

      # -----------------------
      # Pagesアップロード
      # -----------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4