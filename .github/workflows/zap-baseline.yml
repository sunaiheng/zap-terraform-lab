name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # ZAP Scan
      # -----------------------------
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/"
          fail_action: false

      # -----------------------------
      # Debug: check generated files
      # -----------------------------
      - name: List files (debug)
        run: |
          echo "=== FIND HTML FILES ==="
          find . -name "*.html" || true

      # -----------------------------
      # Prepare Pages content
      # -----------------------------
      - name: Prepare ZAP report for Pages
        run: |
          mkdir -p docs/zap-report

          # いろんなパターンを吸収
          if [ -f report.html ]; then
            cp report.html docs/zap-report/index.html
          elif [ -f ./report.html ]; then
            cp ./report.html docs/zap-report/index.html
          elif [ -f ./zap-baseline-report.html ]; then
            cp ./zap-baseline-report.html docs/zap-report/index.html
          elif [ -f ./baseline.html ]; then
            cp ./baseline.html docs/zap-report/index.html
          else
            echo "<h1>ZAP report not found</h1><p>Check workflow logs</p>" > docs/zap-report/index.html
          fi

      # -----------------------------
      # Upload Pages artifact
      # -----------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4