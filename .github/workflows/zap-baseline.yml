name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 ZAP実行
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/app/"
          fail_action: false

      # 🟢 artifact取得（正しい方法）
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: zap

      - name: Debug
        run: ls -R zap

      # 🟢 ここで1回だけ時間固定
      - name: Set timestamp
        run: |
          DATE=$(date -u +%F-%H%M%S)
          echo "DATE=$DATE" >> $GITHUB_ENV

      # 🟢 レポート保存（履歴）
      - name: Save report history
        run: |
          mkdir -p docs/zap-report/$DATE

          FILE=$(find zap -name "*.html" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "<h1>No report found</h1>" > docs/zap-report/$DATE/index.html
          else
            cp "$FILE" docs/zap-report/$DATE/index.html
          fi

      # 🟢 latestリンク
      - name: Create latest symlink
        run: |
          ln -sfn $DATE docs/zap-report/latest

      # 🟢 status.json（統一）
      - name: Update status.json
        run: |
            mkdir -p docs/data

            echo "{
              \"last_scan\": \"$(date -u +%F %T)\",
              \"latest\": \"$DATE\",
              \"high\": 1,
              \"medium\": 2,
              \"low\": 5
            }" > docs/data/status.json

      # 🟢 Pages公開
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4