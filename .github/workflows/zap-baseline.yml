name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/app/"
          fail_action: false
          report_format: html
          report_file: zap-report.html

      - name: Debug files
        run: ls -R

      - name: Prepare report
        run: |
          mkdir -p docs/zap-report

          if [ -f zap-report.html ]; then
            cp zap-report.html docs/zap-report/index.html
          else
            echo "<h1>No report found</h1>" > docs/zap-report/index.html
          fi

      - name: Update status.json
        run: |
          mkdir -p docs/data
          echo "{\"last_scan\":\"$(date -u)\"}" > docs/data/status.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4