name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # ZAP実行（HTML出力）
      # -------------------------
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/app/"
          fail_action: false

      # -------------------------
      # artifact取得
      # -------------------------
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: zap

      - name: Debug
        run: ls -R zap

      # -------------------------
      # ★正確なテーブル抽出（ここが重要）
      # -------------------------
      - name: Parse ZAP results (accurate)
        run: |
          echo "Searching HTML reports..."

          FILE=$(find . -name "*.html" | grep -i zap | head -n 1)

          if [ -z "$FILE" ]; then
            FILE=$(find . -name "*.html" | head -n 1)
          fi

          echo "Using FILE=$FILE"

          if [ ! -f "$FILE" ]; then
            echo "No HTML report found"
            exit 1
          fi

          HIGH=$(grep -E "High</td>" -A1 "$FILE" | tail -n1 | grep -oE "[0-9]+")
          MEDIUM=$(grep -E "Medium</td>" -A1 "$FILE" | tail -n1 | grep -oE "[0-9]+")
          LOW=$(grep -E "Low</td>" -A1 "$FILE" | tail -n1 | grep -oE "[0-9]+")


          HIGH=${HIGH:-0}
          MEDIUM=${MEDIUM:-0}
          LOW=${LOW:-0}

          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV

      # -------------------------
      # timestamp固定
      # -------------------------
      - name: Set timestamp
        run: |
          DATE=$(date -u +%F-%H%M%S)
          echo "DATE=$DATE" >> $GITHUB_ENV

      # -------------------------
      # status.json（履歴完全版）
      # -------------------------
      - name: Update status.json
        run: |
          mkdir -p docs/data
          FILE=docs/data/status.json

          if [ -f "$FILE" ]; then
            HISTORY=$(jq '.history // []' $FILE)
          else
            HISTORY="[]"
          fi

          UPDATED=$(echo $HISTORY | jq --arg d "$DATE" '[.[]] + [$d] | .[0:10]')

          echo "{
            \"last_scan\": \"$(date -u +%F %T)\",
            \"latest\": \"$DATE\",
            \"high\": $HIGH,
            \"medium\": $MEDIUM,
            \"low\": $LOW,
            \"history\": $UPDATED
          }" > $FILE

      # -------------------------
      # レポート保存
      # -------------------------
      - name: Save report
        run: |
          mkdir -p docs/zap-report/$DATE
          find zap -name "*.html" -exec cp {} docs/zap-report/$DATE/index.html \;

      # -------------------------
      # latestリンク
      # -------------------------
      - name: Create latest link
        run: |
          ln -sfn $DATE docs/zap-report/latest

      # -------------------------
      # Pages公開
      # -------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4