name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        continue-on-error: true
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/app/"
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap_scan
          cmd_options: "-a -r report_html.html -J report_json.json"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: zap_scan
          path: zap

      - name: Debug
        run: ls -R zap

      - name: Parse ZAP results from JSON
        run: |
          FILE="./zap/report_json.json"

          if [ ! -f "$FILE" ]; then
            echo "JSON report not found"
            exit 1
          fi

          HIGH=$(jq '[.. | objects | select((.riskdesc? | type == "string") and (.riskdesc | startswith("High")))] | length' "$FILE")
          MEDIUM=$(jq '[.. | objects | select((.riskdesc? | type == "string") and (.riskdesc | startswith("Medium")))] | length' "$FILE")
          LOW=$(jq '[.. | objects | select((.riskdesc? | type == "string") and (.riskdesc | startswith("Low")))] | length' "$FILE")
          INFO=$(jq '[.. | objects | select((.riskdesc? | type == "string") and (.riskdesc | startswith("Info")))] | length' "$FILE")

          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV
          echo "INFO=$INFO" >> $GITHUB_ENV

          echo "HIGH=$HIGH"
          echo "MEDIUM=$MEDIUM"
          echo "LOW=$LOW"
          echo "INFO=$INFO"

      - name: Set timestamp
        run: |
          DATE=$(date -u +%F-%H%M%S)
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Update status.json
        run: |
          mkdir -p docs/data
          FILE=docs/data/status.json

          if [ -f "$FILE" ] && jq empty "$FILE" 2>/dev/null; then
            HISTORY=$(jq '.history // []' "$FILE")
          else
            HISTORY="[]"
          fi

          NORMALIZED_HISTORY=$(echo "$HISTORY" | jq '
            map(
              if type == "string" then
                {
                  date: .,
                  high: 0,
                  medium: 0,
                  low: 0,
                  info: 0
                }
              else
                {
                  date: .date,
                  high: (.high // 0),
                  medium: (.medium // 0),
                  low: (.low // 0),
                  info: (.info // 0)
                }
              end
            )
          ')

          UPDATED=$(echo "$NORMALIZED_HISTORY" | jq \
            --arg date "$DATE" \
            --argjson high "$HIGH" \
            --argjson medium "$MEDIUM" \
            --argjson low "$LOW" \
            --argjson info "$INFO" \
            '[
              {
                date: $date,
                high: $high,
                medium: $medium,
                low: $low,
                info: $info
              }
            ] + .
            | unique_by(.date)
            | sort_by(.date)
            | reverse
            | .[0:10]')

          jq -n \
            --arg last_scan "$(date -u '+%F %T')" \
            --arg latest "$DATE" \
            --argjson high "$HIGH" \
            --argjson medium "$MEDIUM" \
            --argjson low "$LOW" \
            --argjson info "$INFO" \
            --argjson history "$UPDATED" \
            '{
              last_scan: $last_scan,
              latest: $latest,
              high: $high,
              medium: $medium,
              low: $low,
              info: $info,
              history: $history
            }' > "$FILE"

      - name: Save report
        run: |
          mkdir -p docs/zap-report/$DATE
          cp zap/report_html.html docs/zap-report/$DATE/index.html
          cp zap/report_json.json docs/zap-report/$DATE/report_json.json
      
      - name: Convert ZAP report to SARIF
        run: |
          python scripts/zap_to_sarif.py zap/report_json.json zap.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap.sarif

      - name: Create latest redirect
        run: |
          mkdir -p docs/zap-report/latest
          cat > docs/zap-report/latest/index.html <<EOF
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=../$DATE/">
              <title>Redirecting...</title>
            </head>
            <body>
              <a href="../$DATE/">Latest ZAP Report</a>
            </body>
          </html>
          EOF

      - name: Commit ZAP report history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json docs/zap-report
          git diff --cached --quiet && exit 0
          git commit -m "Update ZAP baseline report"
          git pull --rebase origin main
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4