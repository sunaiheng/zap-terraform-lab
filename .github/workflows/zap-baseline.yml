name: ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 ZAP実行
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://sunaiheng.github.io/zap-terraform-lab/app/"
          fail_action: false

      - name: Extract vulnerability counts
        run: |
          echo "Extracting ZAP results..."

          HIGH=$(grep -o "High</td>" zap-artifacts -R | wc -l || true)
          MEDIUM=$(grep -o "Medium</td>" zap-artifacts -R | wc -l || true)
          LOW=$(grep -o "Low</td>" zap-artifacts -R | wc -l || true)

          echo "HIGH=$HIGH"
          echo "MEDIUM=$MEDIUM"
          echo "LOW=$LOW"

          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV

      # 🟢 artifact取得（正しい方法）
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: zap

      - name: Debug
        run: ls -R zap

      # 🟢 ここで1回だけ時間固定
      - name: Set timestamp
        run: |
          DATE=$(date -u +%F-%H%M%S)
          echo "DATE=$DATE" >> $GITHUB_ENV

      # 🟢 レポート保存（履歴）
      - name: Save report history
        run: |
          mkdir -p docs/zap-report/$DATE

          FILE=$(find zap -name "*.html" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "<h1>No report found</h1>" > docs/zap-report/$DATE/index.html
          else
            cp "$FILE" docs/zap-report/$DATE/index.html
          fi

      # 🟢 latestリンク
      - name: Create latest symlink
        run: |
          ln -sfn $DATE docs/zap-report/latest

      # 🟢 status.json（統一）
      - name: Update status.json (with history)
        run: |
          DATE=$(date -u +%F-%H%M%S)

          mkdir -p docs/data

          FILE=docs/data/status.json

          if [ -f "$FILE" ]; then
            HISTORY=$(jq -r '.history // []' $FILE)
          else
            HISTORY="[]"
          fi

          UPDATED=$(echo $HISTORY | jq --arg d "$DATE" '[.[]] + [$d] | .[0:10]')

          echo "{
            \"last_scan\": \"$(date -u +%F %T)\",
            \"latest\": \"$DATE\",
            \"history\": $UPDATED
          }" > $FILE

      # 🟢 Pages公開
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: zap_scan
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4